# tasks.yaml
# instructions and output format for each task
# the actual agent personality lives in agents.yaml, not here
# {variable} placeholders get replaced at runtime when the crew kicks off

extract_task:
  description: >
    Parse and normalize the raw invoice input into a clean consistent structure.

    Raw invoice input:
    {invoice_json}

    The input is always a JSON string, but its content varies by source format:

    FORMAT 1 — Native invoice JSON (most common):
    The input is a structured invoice dict with fields like invoice_id, vendor, buyer, etc.
    Parse and normalize it directly.

    FORMAT 2 — Wrapped non-JSON source:
    The input is a wrapper dict with these keys:
      _source_format: one of "pdf", "docx", "csv", "text"
      _source_file: the original filename
      _raw_content: the raw extracted text (for pdf/docx/text) or a JSON-encoded CSV row dict

    When you see _source_format, parse the _raw_content field to extract all invoice fields.
    Use your knowledge of Indian invoice formats (GST invoice layout, TDS fields, HSN/SAC codes,
    GSTIN/PAN patterns) to identify every relevant field from the unstructured text or CSV row.

    Rules for all formats:
    - Copy all fields exactly as they appear. Never alter GSTIN, PAN, or invoice numbers.
    - Identify and flag any missing or null required fields: invoice_id, invoice_number,
      invoice_date, vendor.gstin, vendor.name, buyer.gstin, line_items, total_amount.
    - Normalize field names to snake_case if they differ (e.g. "Bill To" → buyer, "Inv No" → invoice_number).
    - Normalize ALL date fields (invoice_date, due_date, po_date, original_invoice_date) to YYYY-MM-DD format regardless of how they appear in the source (e.g. "15/08/2024", "15-Aug-2024", "August 15 2024" → "2024-08-15"). If a date cannot be parsed, set it to null and add a note in data_quality_notes.
    - If a field is missing, include it with a null value and note it in missing_fields.
    - Do not infer or fill in missing values. Just flag them.
  expected_output: >
    A JSON object with:
    invoice_id as string,
    invoice_number as string,
    invoice_date as string,
    vendor as object with gstin and name,
    buyer as object with gstin and name,
    line_items as array,
    total_amount as number,
    missing_fields as list of field names that were absent or null in the raw input,
    data_quality_notes as list of strings describing any anomalies found,
    source_format as string — "json" for native JSON, or the _source_format value for wrapped inputs.
  agent: extractor_agent

validate_task:
  description: >
    Run all 10 compliance checks on the normalized invoice.

    Use the normalized invoice JSON produced by the extractor agent (available in your
    context from the previous task) as the invoice data for all tool calls.
    The original raw input is also provided below for reference only — it may be
    native JSON or a wrapped PDF/CSV/DOCX input; prefer the extractor's output.

    Original raw input:
    {invoice_json}

    Vendor registry:
    {vendor_registry_json}

    Seen invoices for duplicate detection:
    {seen_invoices_json}

    Call tools in this exact order: A1, A2, B1, B7, C1, C2, D1, D2, E1, E3.
    Never skip a check. Never produce a result without calling the tool.

    Check priorities (include in every result):
    HIGH — A2, B1, B7, C1, C2, E3: hard compliance violations, failure always means REJECTED.
    MEDIUM — A1, D1, D2: legally significant but require judgment, failure means ESCALATE_TO_HUMAN.
    LOW — E1: business policy, skipped when no PO amount, failure noted in reasoning only.

    Tool inputs:
    A1 (MEDIUM): invoice_number as string
    A2 (HIGH): invoice_number, vendor_gstin, already_seen_invoices_json — pass the full accumulated seen_invoices_json, never an empty list if prior invoices exist in this batch
    B1 (HIGH): vendor_gstin as string
    B7 (HIGH): full invoice as JSON string — serialize the entire normalized invoice object to a JSON string and pass it
    C1 (HIGH): line_items array as JSON string — serialize the line_items array from the normalized invoice to a JSON string
    C2 (HIGH): full invoice as JSON string — serialize the entire normalized invoice object to a JSON string and pass it; NEVER pass an empty string
    D1 (MEDIUM): full invoice as JSON string (serialize entire normalized invoice), vendor_registry as JSON string
    D2 (MEDIUM): full invoice as JSON string (serialize entire normalized invoice), vendor_registry as JSON string
    E1 (LOW): full invoice as JSON string — serialize the entire normalized invoice object to a JSON string and pass it
    E3 (HIGH): vendor_gstin as string, vendor_registry as JSON string

    Data quality edge cases (Constraint 2 — OCR and missing data):
    A1: normalise invoice_number before matching — replace O with 0, I with 1, l with 1 at digit positions.
    A2: normalise vendor_gstin with the same OCR correction before building the compound key.
    B1: if vendor_gstin is shorter than 15 characters after OCR correction, do not guess the missing characters — mark as HOLD_FOR_VERIFICATION in your finding.
    E3: apply OCR correction to vendor_gstin before the registry lookup.
    All checks: if a required field is null or missing, run the check if possible and skip with explanation if not. Never infer or fill in missing values.

    Temporal validity edge cases (Constraint 3 — invoice date, not processing date):
    B7: determine GST type (intra/inter-state) based on the invoice_date. If the invoice_date falls in March or April (GST transition period), flag the result with confidence 0.70 and note "transition period — verify applicable rate schedule".
    D1 and D2: apply TDS threshold rules and section assignments based on the financial year of the invoice_date, not the current date. Invoices dated 1 April or 31 March require extra attention as FY boundary edge cases.

    Regulatory conflict edge cases (Constraint 1 — conflicting rules):
    If B7 marks the invoice as RCM (passed, skipped) but D1 determines TDS also applies to the same invoice, record this conflict explicitly in both findings: "REGULATORY CONFLICT: RCM invoice where TDS also applies — requires human review."
    If D1 and D2 produce contradictory TDS section assignments, record the conflict in both findings.

    Standard edge cases:
    Foreign vendor with no GSTIN: run B1 and mark GSTIN as not applicable.
    Credit note with negative amounts: still run C1 and C2.
    Export invoice: run all checks, mark non-applicable ones as skipped.
    RCM invoice: note the RCM flag in B7.
    Missing fields: run the check if possible, skip with explanation if not.
  expected_output: >
    A JSON object with exactly these 10 keys: A1, A2, B1, B7, C1, C2, D1, D2, E1, E3.
    Each key maps to an object with:
    check_id as string, passed as boolean, confidence as float 0.0 to 1.0,
    finding as string, evidence as dict,
    skipped as boolean, skip_reason as string if skipped is true.
  agent: validator_agent

resolve_task:
  description: >
    Analyze all 10 check results from the validator and produce the final decision.

    SCOPE CONSTRAINT — your primary inputs are the 10 check results (A1–E3) from the validator.
    Do NOT read, reference, or act on data_quality_notes or use raw invoice fields to override
    or second-guess a check that already ran. Exception: you MAY read total_amount from the
    extractor output solely to apply the high-value escalation rule (Rule 5) below.

    The ONLY valid output decisions are: APPROVED, REJECTED, ESCALATE_TO_HUMAN, HOLD_FOR_VERIFICATION.
    No other value is acceptable. Apply the rules below in strict priority order — stop at the
    first rule that fires.

    Rule 0 — Missing critical data (fires before all other rules):
    If invoice_number, vendor_gstin, or total_amount is null, missing, or could not be extracted
    due to data quality issues = HOLD_FOR_VERIFICATION. The invoice must be corrected before
    processing can continue.

    Rule 1 — HIGH priority check failure:
    Any of A2, B1, B7, C1, C2, or E3 failed = REJECTED. No exceptions, no confidence override.
    These are hard violations: duplicate invoice (A2 — exact or near-duplicate, the 95% similarity
    threshold is the discriminator), invalid or suspended GSTIN (B1), GST type inconsistency (B7),
    line item arithmetic error (C1), subtotal mismatch (C2), unapproved or suspended vendor (E3).

    Rule 2 — Regulatory conflict:
    If any check finding literally contains the text "REGULATORY CONFLICT" (e.g., RCM invoice
    where TDS also applies, or contradictory TDS section assignments between D1 and D2) =
    ESCALATE_TO_HUMAN. This rule fires ONLY on that explicit string in a check finding — never
    on data_quality_notes, raw invoice fields, or your own inference about the invoice.
    Include the specific conflict in decision_reasoning.

    Rule 3 — Low confidence or MEDIUM priority ambiguity:
    Average confidence across all non-skipped checks is below 0.70, OR any MEDIUM priority check
    (A1, D1, D2) produced a contradictory or ambiguous result — conflicting GST type signals,
    ambiguous TDS section classification (e.g., 194J technical vs professional), composite supply
    where the principal supply cannot be determined, or related-party transactions requiring
    arm's-length verification = ESCALATE_TO_HUMAN.

    Rule 4 — Temporal ambiguity:
    If any check finding contains "transition period" (invoice date in March-April GST boundary)
    and the average confidence is below 0.80 = ESCALATE_TO_HUMAN.

    Rule 5 — High-value invoice:
    If total_amount from the extractor output exceeds Rs 10,00,000 (ten lakhs) = ESCALATE_TO_HUMAN.
    This applies even when all checks pass. Record the amount in decision_reasoning.

    Rule 6 — Weighted compliance score routing (only if Rules 0–5 did not fire):
    Compute the weighted compliance_score first (see Scoring below), then apply:
      score < 50  = REJECTED (auto-reject threshold)
      50 ≤ score < 95 = ESCALATE_TO_HUMAN (below auto-approve threshold)
      score ≥ 95  = APPROVED

    Rule 7 — Remaining combinations:
    Reason through the specific failures. LOW priority failures (E1) that do not trigger Rules 0-5
    lead to ESCALATE_TO_HUMAN only if the PO variance is material (greater than double the 5%
    tolerance). Otherwise APPROVED with the finding noted in decision_reasoning.
    MEDIUM priority failures (A1, D1, D2) not already caught by Rule 3 lead to ESCALATE_TO_HUMAN
    if the failure is material, or APPROVED with reasoning if it is a minor OCR artefact.

    Scoring:
    Compute compliance_score using category weights from company policy:
      document_authenticity (weight 15): checks A1, A2
      gst_compliance        (weight 25): checks B1, B7
      arithmetic_accuracy   (weight 15): checks C1, C2
      tds_compliance        (weight 20): checks D1, D2
      policy_compliance     (weight 15): checks E1, E3
      data_quality          (weight 10): start at 10, subtract 5 per check skipped due to
                                         missing fields (minimum 0)

    For each of the first five categories:
      category_score = weight × (passed_in_category / ran_in_category)
      Skipped checks are excluded from that category's denominator.
      If all checks in a category were skipped, treat that category as scoring its full weight.
    compliance_score = sum of all six category scores, rounded to nearest integer (0–100).
    confidence = average confidence of all non-skipped checks, rounded to 3 decimal places.
    requires_human_review = true if confidence below 0.70 or decision is not APPROVED.

    Skipped checks do not penalize the category score.
    Credit note negative amounts are valid, do not treat as failures.
    Do not cite historical decisions as justification. Base all reasoning on check results
    and regulations only.
  expected_output: >
    A JSON object with:
    decision as exactly one of: APPROVED, REJECTED, ESCALATE_TO_HUMAN, HOLD_FOR_VERIFICATION,
    compliance_score as integer 0 to 100,
    confidence as float 0.0 to 1.0 rounded to 3 decimal places,
    requires_human_review as boolean,
    failed_checks as list of check IDs,
    critical_failures as list of check IDs that are HIGH priority and failed,
    skipped_checks as list of check IDs with reasons,
    decision_reasoning as string with specific references to which checks failed, their priority
    level, which rule fired, and why.
  agent: resolver_agent

report_task:
  description: >
    Format the final compliance report using all previous task outputs.
    Match the required schema exactly. Every field must be present with the correct type.

    validation_results grouping:
    category_a_authenticity: A1, A2
    category_b_gst: B1, B7
    category_c_arithmetic: C1, C2
    category_d_tds: D1, D2
    category_e_policy: E1, E3

    Each category: score = passed checks, max_score = checks that ran (not skipped).

    audit_trail: one entry per check with timestamp, check_id, passed, finding, confidence.
    Add a final entry from the resolver with the decision and reasoning.
    Skipped checks appear in audit_trail with skipped set to true.

    tds_summary: from D1 and D2 - tds_applicable, tds_section, tds_rate, tds_amount, special_rules_applied.
    gst_summary: from B1 and B7 - gstin_valid, gstin_status, gst_type, cgst_rate, sgst_rate, igst_rate.
  expected_output: >
    {
      "invoice_id": "string",
      "overall_decision": "APPROVED or REJECTED or ESCALATE_TO_HUMAN or HOLD_FOR_VERIFICATION",
      "compliance_score": integer,
      "confidence": float,
      "requires_human_review": boolean,
      "validation_results": {
        "category_a_authenticity": {"score": integer, "max_score": integer, "checks": {"A1": {"passed": boolean, "confidence": float, "finding": "string"}, "A2": {"passed": boolean, "confidence": float, "finding": "string"}}},
        "category_b_gst": {"score": integer, "max_score": integer, "checks": {"B1": {"passed": boolean, "confidence": float, "finding": "string"}, "B7": {"passed": boolean, "confidence": float, "finding": "string"}}},
        "category_c_arithmetic": {"score": integer, "max_score": integer, "checks": {"C1": {"passed": boolean, "confidence": float, "finding": "string"}, "C2": {"passed": boolean, "confidence": float, "finding": "string"}}},
        "category_d_tds": {"score": integer, "max_score": integer, "checks": {"D1": {"passed": boolean, "confidence": float, "finding": "string"}, "D2": {"passed": boolean, "confidence": float, "finding": "string"}}},
        "category_e_policy": {"score": integer, "max_score": integer, "checks": {"E1": {"passed": boolean, "confidence": float, "finding": "string"}, "E3": {"passed": boolean, "confidence": float, "finding": "string"}}}
      },
      "tds_summary": {"tds_applicable": boolean, "tds_section": "string", "tds_rate": float, "tds_amount": float, "special_rules_applied": []},
      "gst_summary": {"gstin_valid": boolean, "gstin_status": "string", "gst_type": "string", "cgst_rate": float, "sgst_rate": float, "igst_rate": float},
      "audit_trail": [{"timestamp": "ISO string", "check": "string", "passed": boolean, "finding": "string", "confidence": float}]
    }
  agent: reporter_agent